[mypy]
python_version = 3.11
strict = true
warn_return_any = true
warn_unused_configs = true
; exclure les scripts de maintenance et les orchestrateurs hors scope
exclude = ^(scripts|clean_data|get_data)

; Bibliothèques tierces sans stubs mypy disponibles
[mypy-fitparse]
ignore_missing_imports = true

[mypy-gpxpy]
ignore_missing_imports = true

[mypy-gpxpy.*]
ignore_missing_imports = true

; Modèles SQLAlchemy écrits en style Column legacy : annotations gérées
; manuellement, mypy ne peut pas inférer les types des colonnes sans plugin.
[mypy-src.models]
ignore_errors = true

[mypy-src.models_clean]
ignore_errors = true
